name: AgileTest Sync
on:
  workflow_dispatch:
    inputs:
      TEST_EXECUTION_KEY:
        description: "Test Execution Key from Jira"
        required: false
      PROJECT_KEY:
        description: "Project Key from Jira"
        required: true
      milestoneId:
        description: "Milestone ID passed from AgileTest"
        required: false
      testPlanKeys:
        description: "Test Plan Keys passed from AgileTest (e.g. TP-1,TP-2)"
        required: false

env:
  BASE_URL: ${{ vars.BASE_URL }}
  BASE_AUTH_URL: ${{ vars.BASE_AUTH_URL }}
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  PROJECT_KEY: ${{ github.event.inputs.PROJECT_KEY || vars.PROJECT_KEY }}
  TEST_EXECUTION_KEY: ${{ github.event.inputs.TEST_EXECUTION_KEY }}
  # Khai báo biến môi trường từ inputs mới
  MILESTONE_ID: ${{ github.event.inputs.milestoneId }}
  TEST_PLAN_KEYS: ${{ github.event.inputs.testPlanKeys }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Execute Tests
        id: run_tests
        run: mvn test
        continue-on-error: true   # ← Cho phép chạy tiếp dù test fail để còn sync báo cáo

      - name: Submit to AgileTest
        id: submit_agiletest       
        if: always()
        run: |
          TOKEN=$(curl -s -X POST "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" \
            | tr -d '"' | tr -d '\n' | tr -d '\r' | tr -d ' ')

          echo "TOKEN length: ${#TOKEN}"

          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Token rong!"; exit 1
          fi

          # 1. TỰ ĐỘNG XÂY DỰNG URL UPLOAD DỰA TRÊN CÁC THAM SỐ ĐẦU VÀO ĐỘNG
          UPLOAD_URL="$BASE_URL/ds/test-executions/junit?projectKey=$PROJECT_KEY"
          
          if [ -not -z "$TEST_EXECUTION_KEY" ]; then
            UPLOAD_URL="${UPLOAD_URL}&testExecutionKey=${TEST_EXECUTION_KEY}"
          fi
          
          # Nếu App có truyền milestoneId sang, gắn thêm vào URL
          if [ -not -z "$MILESTONE_ID" ]; then
            UPLOAD_URL="${UPLOAD_URL}&milestoneId=${MILESTONE_ID}"
            echo "Gắn thêm tham số Milestone ID: $MILESTONE_ID"
          fi
          
          # Nếu App có truyền testPlanKeys sang, gắn thêm vào URL
          if [ -not -z "$TEST_PLAN_KEYS" ]; then
            UPLOAD_URL="${UPLOAD_URL}&testPlanKeys=${TEST_PLAN_KEYS}"
            echo "Gắn thêm tham số Test Plan Keys: $TEST_PLAN_KEYS"
          fi

          echo "Final Target Upload URL: $UPLOAD_URL"

          UPLOAD_FAILED=0

          for FILE in $(find target/surefire-reports -name "TEST-*.xml"); do
            echo "Uploading: $FILE"
            # Thực hiện gọi API bằng URL động đã cấu trúc ở trên
            RESPONSE=$(curl -s -X POST "$UPLOAD_URL" \
              -H "Content-Type: application/xml" \
              -H "Authorization: JWT $TOKEN" \
              --data-binary "@$FILE")
            echo "Response: $RESPONSE"

            if echo "$RESPONSE" | grep -q '"error"'; then
              echo "Upload FAILED for $FILE"
              UPLOAD_FAILED=1
            fi
          done

          if [ "$UPLOAD_FAILED" -eq 1 ]; then
            echo "One or more uploads failed"
            exit 1   
          fi

          echo "All uploads successful"

      - name: Update Pipeline Status
        if: always()
        env:
          UPLOAD_RESULT: ${{ steps.submit_agiletest.outcome }}  
        run: |
          if [ "$UPLOAD_RESULT" == "success" ]; then
            RESULT="success"
          else
            RESULT="failed"
          fi

          echo "Upload outcome: $UPLOAD_RESULT → Pipeline result: $RESULT"

          TOKEN=$(curl -s -X POST "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" \
            | tr -d '"' | tr -d '\n' | tr -d '\r' | tr -d ' ')

          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Token rong!"; exit 1
          fi

          JOB_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BRANCH_NAME="${GITHUB_REF_NAME}"
          AUTHOR="${GITHUB_ACTOR}"

          # Lưu ý: Endpoint history giữ nguyên cấu trúc cũ vì nó chỉ ghi nhận log chạy của hạ tầng CI/CD
          RESPONSE=$(curl -s -X POST "$BASE_AUTH_URL/ds/test-executions/$TEST_EXECUTION_KEY/pipeline/history?projectKey=$PROJECT_KEY" \
            -H "Content-Type: application/json" \
            -H "Authorization: JWT $TOKEN" \
            --data '{"jobURL":"'"$JOB_URL"'", "repository":"'"$GITHUB_REPOSITORY"'", "tool":"github", "result":"'"$RESULT"'", "branchName":"'"$BRANCH_NAME"'", "author":"'"$AUTHOR"'"}' )

          echo "Pipeline update response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "Failed to update pipeline status"
            exit 1
          fi
